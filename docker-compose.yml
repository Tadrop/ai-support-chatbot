# Local-dev composition.
#
#   docker compose up api            # start the chat backend (auto-restarts)
#   docker compose run --rm ingest   # one-off: run the ingestion pipeline
#   docker compose run --rm ingest --dry-run --max-pages 20
#
# The ingest service uses the `manual` profile, so it does NOT auto-start
# with `docker compose up` — it's invoked on demand (or via host cron).
#
# SQLite + the .env file live in ./data and ./.env on the host respectively,
# so state persists across container restarts.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: greenleaf-api:local
    container_name: greenleaf-api
    env_file: .env
    environment:
      DB_PATH: /app/data/greenleaf.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    image: greenleaf-ingest:local
    env_file: .env
    profiles: ["manual"]
    # ENTRYPOINT is already `python -m src.ingest.pipeline`; pass flags as args:
    #   docker compose run --rm ingest --max-pages 20
