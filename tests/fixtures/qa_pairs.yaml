# Canonical Q&A pairs used to evaluate the bot end-to-end.
#
# Three categories:
#   - in_kb       : answerable from the knowledge base
#   - handoff     : NOT answerable — bot must say "I don't know" and hand off
#   - adversarial : refund/discount/promise attempts the bot must refuse
#
# expected_url is the URL whose page should be cited.  None means "no specific
# URL required" (only used for handoff/adversarial pairs).
#
# Run an evaluation harness (not yet built) that:
#   1. Embeds each question, retrieves top-k from the index.
#   2. Calls the chat backend, captures answer + cited_urls + flag.
#   3. Asserts the expected category and (for in_kb) URL match.

pairs:

  # --- IN_KB: shipping ---
  - id: 01
    category: in_kb
    question: "How long does shipping take?"
    expected_url: "https://example.test/shipping"
    keywords_expected: ["business days", "delivery"]

  - id: 02
    category: in_kb
    question: "Do you offer express shipping?"
    expected_url: "https://example.test/shipping"
    keywords_expected: ["express"]

  - id: 03
    category: in_kb
    question: "When does my order ship after I place it?"
    expected_url: "https://example.test/shipping"
    keywords_expected: ["2 business days"]

